<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Arethium - Registration Page</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/auth.css}" />
</head>
<body>
<div class="auth-container">
    <form th:action="@{/authorization/register}" th:object="${registerDTO}" method="post">
        <h2>Register</h2>
        <input type="text" th:field="*{name}" placeholder="Name" required/><br>
        <input type="email" th:field="*{email}" placeholder="Email Address" required/><br>
        <input type="password" th:field="*{password}" placeholder="Password" required/><br>
        <input type="password" th:field="*{confirmPassword}" placeholder="Confirm Password" required/><br>

        <button type="submit">Register</button><br>

        <div th:if="${message}" id="message">
            <p th:text="${message}"></p>
        </div>
        <p>If Registered.</p><p id="redirect"><a th:href="@{/authorization/login}">LogIn</a> </p>
    </form>
</div>
</body>
</html>
